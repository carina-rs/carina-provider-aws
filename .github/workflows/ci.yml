name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  wasm-build:
    name: WASM Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: wasm
      - run: cargo build -p carina-provider-aws --target wasm32-wasip2 --release
      - name: Cache vela-cli
        id: cache-vela
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/vela
          key: vela-cli-${{ runner.os }}-v1
      - name: Install vela-cli
        if: steps.cache-vela.outputs.cache-hit != 'true'
        run: cargo install --git https://github.com/mizzy/vela vela-cli --quiet
      - name: Optimize WASM with vela
        run: vela optimize target/wasm32-wasip2/release/carina-provider-aws.wasm -o target/wasm32-wasip2/release/carina-provider-aws.wasm
      - uses: actions/upload-artifact@v4
        with:
          name: carina-provider-aws.wasm
          path: target/wasm32-wasip2/release/carina-provider-aws.wasm

  codegen-check:
    name: Codegen Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Run schema codegen
        run: ./scripts/generate-schemas-smithy.sh
      - name: Verify no uncommitted changes
        run: |
          if ! git diff --exit-code; then
            echo "::error::Schema codegen produced uncommitted changes. Run './scripts/generate-schemas-smithy.sh' locally and commit the results."
            exit 1
          fi
